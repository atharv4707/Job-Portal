<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - JobConnect</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="logo">
        <img src="/images/logo.svg" alt="JobConnect" style="height: 36px; vertical-align: middle; margin-right: 8px;">
        JobConnect
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="/"><i class="fas fa-home"></i> Home</a></li>
        <li><a href="/jobs"><i class="fas fa-briefcase"></i> Browse Jobs</a></li>
        <li><a href="/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
        <li><a href="/profile"><i class="fas fa-user"></i> Profile</a></li>
        <li><a href="#" onclick="logout()" class="btn btn-secondary"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
      </ul>
    </div>
  </nav>

  <div class="form-container" style="max-width: 700px;">
    <div style="text-align: center; margin-bottom: 1.5rem;">
      <img src="/images/default-avatar.svg" alt="Profile Avatar" style="width: 90px; height: 90px; border-radius: 50%; border: 4px solid #667eea; padding: 4px;">
    </div>
    <h2 style="text-align: center;"><i class="fas fa-user-circle" style="color: #667eea; margin-right: 0.5rem;"></i>My Profile</h2>
    <div id="alertMessage"></div>
    
    <form id="profileForm">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" disabled style="background: #f5f5f5;">
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone">
      </div>

      <div id="jobseekerFields" style="display: none;">
        <div class="form-group">
          <label for="skills">Skills</label>
          <textarea id="skills" name="skills" rows="3" placeholder="e.g., JavaScript, React, Node.js"></textarea>
        </div>

        <div class="form-group">
          <label for="experience">Work Experience</label>
          <textarea id="experience" name="experience" rows="4" placeholder="Describe your work experience"></textarea>
        </div>

        <div class="form-group">
          <label for="education">Education</label>
          <textarea id="education" name="education" rows="3" placeholder="Your educational background"></textarea>
        </div>
      </div>

      <div id="employerFields" style="display: none;">
        <div class="form-group">
          <label for="companyName">Company Name</label>
          <input type="text" id="companyName" name="companyName">
        </div>

        <div class="form-group">
          <label for="companyDescription">Company Description</label>
          <textarea id="companyDescription" name="companyDescription" rows="4" placeholder="Tell us about your company"></textarea>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%;">Update Profile</button>
    </form>
  </div>

  <script src="/js/main.js"></script>
  <script>
    let currentUser = null;

    window.addEventListener('DOMContentLoaded', async () => {
      currentUser = await checkAuth();
      
      if (!currentUser) {
        window.location.href = '/login';
        return;
      }

      loadProfile();
    });

    async function loadProfile() {
      try {
        const response = await fetch(`/api/auth/profile`);
        const data = await response.json();
        
        if (!data.user) {
          window.location.href = '/login';
          return;
        }

        const user = data.user;

        // Show role-specific fields
        if (user.role === 'jobseeker') {
          document.getElementById('jobseekerFields').style.display = 'block';
          document.getElementById('skills').value = user.skills || '';
          document.getElementById('experience').value = user.experience || '';
          document.getElementById('education').value = user.education || '';
        } else {
          document.getElementById('employerFields').style.display = 'block';
          document.getElementById('companyName').value = user.companyName || '';
          document.getElementById('companyDescription').value = user.companyDescription || '';
        }

        // Populate common fields
        document.getElementById('name').value = user.name || '';
        document.getElementById('email').value = user.email || '';
        document.getElementById('phone').value = user.phone || '';
        
      } catch (error) {
        console.error('Error loading profile:', error);
        showAlert('Failed to load profile', 'error');
      }
    }

    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formData = {
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value
      };

      // Add role-specific fields
      if (currentUser.role === 'jobseeker') {
        formData.skills = document.getElementById('skills').value;
        formData.experience = document.getElementById('experience').value;
        formData.education = document.getElementById('education').value;
      } else {
        formData.companyName = document.getElementById('companyName').value;
        formData.companyDescription = document.getElementById('companyDescription').value;
      }

      try {
        const response = await fetch('/api/auth/profile', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });

        const data = await response.json();

        if (response.ok) {
          showAlert('Profile updated successfully!', 'success');
        } else {
          showAlert(data.message || 'Failed to update profile', 'error');
        }
      } catch (error) {
        showAlert('Something went wrong. Please try again.', 'error');
      }
    });

    function showAlert(message, type) {
      const alertDiv = document.getElementById('alertMessage');
      alertDiv.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
      setTimeout(() => {
        alertDiv.innerHTML = '';
      }, 5000);
    }
  </script>
</body>
</html>
