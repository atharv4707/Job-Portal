<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - JobConnect</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="logo">
        <img src="/images/logo.svg" alt="JobConnect" style="height: 36px; vertical-align: middle; margin-right: 8px;">
        JobConnect
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="/"><i class="fas fa-home"></i> Home</a></li>
        <li><a href="/jobs"><i class="fas fa-briefcase"></i> Browse Jobs</a></li>
        <li><a href="/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
        <li><a href="/profile"><i class="fas fa-user"></i> Profile</a></li>
        <li><a href="#" onclick="logout()" class="btn btn-secondary"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <div class="dashboard">
      <aside class="sidebar">
        <div style="text-align: center; margin-bottom: 1.5rem;">
          <img src="/images/default-avatar.svg" alt="Avatar" style="width: 70px; height: 70px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.3);">
        </div>
        <h3 id="userName">Dashboard</h3>
        <ul class="sidebar-menu">
          <li><a href="/dashboard" class="active"><i class="fas fa-tachometer-alt"></i> Overview</a></li>
          <li><a href="/profile"><i class="fas fa-user"></i> My Profile</a></li>
          <li id="postJobLink" style="display: none;"><a href="/post-job"><i class="fas fa-plus-circle"></i> Post a Job</a></li>
          <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
      </aside>

      <main class="dashboard-content">
        <div id="dashboardContent">
          <!-- Content will be loaded here based on user role -->
        </div>
      </main>
    </div>
  </div>

  <script src="/js/main.js"></script>
  <script>
    let currentUser = null;

    window.addEventListener('DOMContentLoaded', async () => {
      currentUser = await checkAuth();
      
      if (!currentUser) {
        window.location.href = '/login';
        return;
      }

      document.getElementById('userName').textContent = `Hello, ${currentUser.name}`;
      
      if (currentUser.role === 'employer') {
        document.getElementById('postJobLink').style.display = 'block';
        loadEmployerDashboard();
      } else {
        loadJobseekerDashboard();
      }
    });

    async function loadEmployerDashboard() {
      try {
        const [jobsResponse, applicationsResponse] = await Promise.all([
          fetch('/api/jobs/employer/my-jobs'),
          fetch('/api/jobs/employer/my-jobs')
        ]);

        const jobs = await jobsResponse.json();
        
        const activeJobs = jobs.filter(j => j.status === 'active').length;
        const filledJobs = jobs.filter(j => j.status === 'filled').length;
        
        const content = document.getElementById('dashboardContent');
        content.innerHTML = `
          <h2 style="margin-bottom: 2rem;">Employer Dashboard</h2>
          
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-number">${jobs.length}</div>
              <div class="stat-label">Total Jobs Posted</div>
            </div>
            <div class="stat-card">
              <div class="stat-number">${activeJobs}</div>
              <div class="stat-label">Active Jobs</div>
            </div>
            <div class="stat-card">
              <div class="stat-number">${filledJobs}</div>
              <div class="stat-label">Filled Positions</div>
            </div>
          </div>

          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h3>Your Job Postings</h3>
            <a href="/post-job" class="btn btn-primary">Post New Job</a>
          </div>

          <table class="data-table">
            <thead>
              <tr>
                <th>Job Title</th>
                <th>Location</th>
                <th>Type</th>
                <th>Status</th>
                <th>Posted</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="jobsTableBody">
              ${jobs.map(job => `
                <tr>
                  <td><strong>${job.title}</strong></td>
                  <td>${job.location}</td>
                  <td>${job.jobType}</td>
                  <td><span class="status-badge status-${job.status}">${job.status}</span></td>
                  <td>${new Date(job.postedAt).toLocaleDateString()}</td>
                  <td>
                    <button class="btn btn-primary" style="padding: 0.4rem 0.8rem; font-size: 0.9rem;" onclick="viewApplications('${job._id}')">View Applications</button>
                    <button class="btn btn-danger" style="padding: 0.4rem 0.8rem; font-size: 0.9rem;" onclick="deleteJob('${job._id}')">Delete</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      } catch (error) {
        console.error('Error loading dashboard:', error);
      }
    }

    async function loadJobseekerDashboard() {
      try {
        const response = await fetch('/api/applications/my-applications');
        const applications = await response.json();
        
        const pendingApps = applications.filter(a => a.status === 'pending').length;
        const reviewedApps = applications.filter(a => a.status === 'reviewed').length;
        const shortlistedApps = applications.filter(a => a.status === 'shortlisted').length;
        
        const content = document.getElementById('dashboardContent');
        content.innerHTML = `
          <h2 style="margin-bottom: 2rem;">Job Seeker Dashboard</h2>
          
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-number">${applications.length}</div>
              <div class="stat-label">Total Applications</div>
            </div>
            <div class="stat-card">
              <div class="stat-number">${pendingApps}</div>
              <div class="stat-label">Pending</div>
            </div>
            <div class="stat-card">
              <div class="stat-number">${shortlistedApps}</div>
              <div class="stat-label">Shortlisted</div>
            </div>
          </div>

          <h3 style="margin-bottom: 1.5rem;">My Applications</h3>

          ${applications.length === 0 ? 
            '<p style="text-align: center; color: #666;">You haven\'t applied to any jobs yet. <a href="/jobs" style="color: #667eea;">Browse jobs</a></p>' :
            `<table class="data-table">
              <thead>
                <tr>
                  <th>Job Title</th>
                  <th>Company</th>
                  <th>Location</th>
                  <th>Applied On</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
                ${applications.map(app => `
                  <tr>
                    <td><strong>${app.jobId.title}</strong></td>
                    <td>${app.jobId.company}</td>
                    <td>${app.jobId.location}</td>
                    <td>${new Date(app.appliedAt).toLocaleDateString()}</td>
                    <td><span class="status-badge status-${app.status}">${app.status}</span></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>`
          }
        `;
      } catch (error) {
        console.error('Error loading dashboard:', error);
      }
    }

    async function viewApplications(jobId) {
      try {
        const response = await fetch(`/api/applications/job/${jobId}`);
        const applications = await response.json();
        
        if (applications.length === 0) {
          alert('No applications received yet for this job.');
          return;
        }

        let message = `Applications received: ${applications.length}\n\n`;
        applications.forEach((app, index) => {
          message += `${index + 1}. ${app.jobseekerId.name} (${app.jobseekerId.email})\n`;
          message += `   Status: ${app.status}\n`;
          message += `   Applied: ${new Date(app.appliedAt).toLocaleDateString()}\n\n`;
        });
        
        alert(message);
      } catch (error) {
        alert('Failed to load applications');
      }
    }

    async function deleteJob(jobId) {
      if (!confirm('Are you sure you want to delete this job posting?')) {
        return;
      }

      try {
        const response = await fetch(`/api/jobs/${jobId}`, {
          method: 'DELETE'
        });

        if (response.ok) {
          alert('Job deleted successfully');
          location.reload();
        } else {
          alert('Failed to delete job');
        }
      } catch (error) {
        alert('Something went wrong');
      }
    }
  </script>
</body>
</html>
